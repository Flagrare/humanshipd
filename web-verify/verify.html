<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>humanshipd — verify a credential</title>
    <style>
      body { font: 15px/1.6 -apple-system, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
      h1 { font-size: 20px; }
      p.note { color: #555; }
      label { display: block; margin: 14px 0 4px; font-weight: 600; }
      button { margin-top: 18px; padding: 9px 16px; font-size: 15px; cursor: pointer; }
      #result { margin-top: 22px; padding: 16px; border-radius: 8px; display: none; }
      #result.valid { background: #e6f4ea; border: 1px solid #137333; }
      #result.invalid { background: #fce8e6; border: 1px solid #b3261e; }
      .verdict { font-weight: 700; font-size: 16px; }
      .claim { margin-top: 8px; }
      .author { margin-top: 10px; font-size: 14px; }
      .author .name { font-weight: 600; }
      .author .unverified { color: #777; font-size: 12px; }
      dl { margin-top: 10px; font-size: 13px; color: #444; }
      dt { font-weight: 600; } dd { margin: 0 0 6px; word-break: break-all; }
      .report { margin-top: 18px; }
      .report h2 { font-size: 14px; margin: 0 0 4px; }
      .summary { font-weight: 600; margin-bottom: 10px; }
      .band { display: grid; grid-template-columns: 180px 48px 1fr; align-items: center; gap: 8px; margin: 5px 0; font-size: 13px; }
      .bar { height: 10px; border-radius: 5px; background: #ccc; }
      .bar.typed { background: #137333; }
      .bar.pasted { background: #e8a33d; }
      .bar.ai_tool { background: #b3261e; }
      .bar.unknown { background: #9aa0a6; }
      .report .note { font-size: 12px; color: #666; margin-top: 8px; }
      .fingerprint { margin-top: 20px; }
      .fingerprint h2 { font-size: 14px; margin: 0 0 6px; }
      .fingerprint svg { width: 100%; height: auto; border: 1px solid #e0e0e0; border-radius: 6px; background: #fafafa; }
      .legend { font-size: 12px; color: #555; margin-top: 6px; display: flex; gap: 16px; }
      .legend span::before { content: ""; display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
      .legend .typed::before { background: #137333; }
      .legend .pasted::before { background: #e8a33d; }
      .fingerprint .note { font-size: 12px; color: #666; margin-top: 6px; }
      .controls { display: flex; align-items: center; gap: 10px; margin-top: 8px; font-size: 13px; }
      .controls button { margin: 0; padding: 4px 12px; font-size: 13px; }
      .controls input[type="range"] { flex: 1; }
      .pastes { margin-top: 8px; font-size: 12px; color: #555; }
      .pastes .marker { display: inline-block; margin: 2px 6px 2px 0; padding: 2px 8px; border: 1px solid #e8a33d; border-radius: 12px; background: #fdf3e3; color: #8a5a12; cursor: pointer; }
      .shape { margin-top: 20px; padding: 12px 14px; border: 1px dashed #cfcfcf; border-radius: 6px; background: #f6f6f6; color: #444; }
      .shape h2 { font-size: 13px; margin: 0 0 6px; color: #555; }
      .shape .assessment { font-weight: 600; font-size: 13px; }
      .shape ul { margin: 8px 0 0; padding-left: 18px; font-size: 13px; }
      .shape .caveat { font-size: 12px; color: #777; margin-top: 8px; }
      #print { margin-top: 18px; display: none; }
      @media print {
        body { margin: 0; max-width: none; }
        label, input[type="file"], #verify, #print, .controls, .pastes { display: none !important; }
        #result { display: block !important; border: 1px solid #999 !important; }
        p.note { display: none; }
      }
    </style>
  </head>
  <body>
    <h1>Verify a Human Authored credential</h1>
    <p class="note">
      Everything runs in your browser — the document and credential never leave this
      page. Verification uses the exact same engine as the command-line tool.
    </p>

    <label for="credential">Credential (<code>.c2pa</code>)</label>
    <input id="credential" type="file" />

    <label for="document">The document it should belong to</label>
    <input id="document" type="file" />

    <button id="verify" disabled>Verify</button>

    <div id="result">
      <div class="verdict" id="verdict"></div>
      <div class="claim" id="claim"></div>
      <div class="author" id="author" style="display: none"></div>
      <dl id="details"></dl>
      <div class="report" id="report"></div>
      <div class="fingerprint" id="fingerprint"></div>
      <div class="shape" id="shape" style="display: none"></div>
      <button id="print">Save as PDF / print</button>
    </div>

    <script type="module">
      import init, { verify_credential } from "./pkg/humanshipd_web_verify.js";

      const button = document.getElementById("verify");
      const result = document.getElementById("result");
      const printButton = document.getElementById("print");
      printButton.addEventListener("click", () => window.print());

      await init();
      // Expose for automated tests; harmless for normal use.
      window.verify_credential = verify_credential;
      button.disabled = false;

      async function bytes(input) {
        const file = input.files[0];
        if (!file) return null;
        return new Uint8Array(await file.arrayBuffer());
      }

      // Fixed label/class maps — provenance & summary are enum strings from the
      // credential; we map only known values so nothing untrusted reaches the DOM.
      const BAND_LABELS = {
        typed: "Typed in a tracked editor",
        pasted: "Pasted",
        ai_tool: "From an AI tool",
        unknown: "Unknown (not captured)",
      };
      const SUMMARY_LABELS = {
        fully_typed: "Fully typed",
        typed_with_pastes: "Typed, with some pastes",
        mostly_pasted: "Mostly pasted",
        unverified: "Unverified — substantial content was not captured",
      };

      function render(out) {
        result.style.display = "block";
        result.className = out.valid ? "valid" : "invalid";
        document.getElementById("verdict").textContent = out.error
          ? `Could not read credential: ${out.error}`
          : out.valid
          ? "✓ Verified"
          : "✗ Not valid";
        document.getElementById("claim").textContent = out.claim || "";

        // Build details with textContent (never innerHTML): the values come from a
        // dropped credential, which could be hostile — treat them as untrusted data.
        const details = document.getElementById("details");
        const report = document.getElementById("report");
        const fingerprint = document.getElementById("fingerprint");
        const shape = document.getElementById("shape");
        const author = document.getElementById("author");
        details.replaceChildren();
        report.replaceChildren();
        fingerprint.replaceChildren();
        shape.replaceChildren();
        author.replaceChildren();
        shape.style.display = "none";
        author.style.display = "none";
        printButton.style.display = out.valid ? "inline-block" : "none";
        if (out.error) return;

        // Self-asserted author — shown only when valid, always labeled unverified.
        if (out.valid && out.author) {
          author.style.display = "block";
          const label = document.createElement("span");
          label.textContent = "Author: ";
          const name = document.createElement("span");
          name.className = "name";
          name.textContent = out.author;
          const note = document.createElement("span");
          note.className = "unverified";
          note.textContent = " — self-asserted, not independently verified";
          author.append(label, name, note);
        }
        const rows = [
          ["Document SHA-256", out.document_sha256],
          ["Characters", String(out.char_count)],
          ["Un-keyed (paste) insertions flagged", String(out.ai_dump_flags)],
        ];
        for (const [label, value] of rows) {
          const dt = document.createElement("dt");
          dt.textContent = label;
          const dd = document.createElement("dd");
          dd.textContent = value;
          details.append(dt, dd);
        }

        // Only show the report + fingerprint when the credential is valid for THIS
        // document — otherwise they describe the credential's own session, not the
        // document on screen, which would mislead.
        if (out.valid) {
          renderReport(report, out.report);
          renderFingerprint(fingerprint, out.timeline);
          renderProcessShape(shape, out.process_shape);
        }
      }

      // Process-shape corroboration (signals spec §3 Tier 2 / §6) — deliberately
      // secondary and muted. It can only ever *corroborate* a human-like drafting
      // rhythm; it NEVER says "this looks like AI". Absence of signal is shown as
      // "inconclusive", with a loud caveat that the signal is weak and spoofable.
      const SHAPE_ASSESSMENT = {
        incremental_composition: "Consistent with incremental human composition",
        inconclusive: "Inconclusive — not enough signal (this is not evidence of AI)",
      };
      const SHAPE_SIGNALS = [
        ["pause_rhythm", "Planning pauses while writing"],
        ["revision_activity", "Revised the text (edits / deletions)"],
        ["burst_segmentation", "Text arrived in several bursts, not one block"],
      ];
      function renderProcessShape(container, shapeData) {
        if (!shapeData) return;
        container.style.display = "block";

        const heading = document.createElement("h2");
        heading.textContent = "Process shape (weak corroboration)";
        container.append(heading);

        const assessment = document.createElement("div");
        assessment.className = "assessment";
        assessment.textContent = SHAPE_ASSESSMENT[shapeData.assessment] || "Inconclusive";
        container.append(assessment);

        const list = document.createElement("ul");
        for (const [key, label] of SHAPE_SIGNALS) {
          const li = document.createElement("li");
          li.textContent = `${shapeData[key] ? "✓" : "—"} ${label}`;
          list.append(li);
        }
        container.append(list);

        const caveat = document.createElement("div");
        caveat.className = "caveat";
        caveat.textContent =
          "Supporting context only — not proof. Process-based humanness is weak and spoofable (studies report 18–48% error rates), and a fluent, clean typist can show little of it. Absence of these signals is never evidence that text is AI-generated.";
        container.append(caveat);
      }

      // Draftback-style writing fingerprint (signals spec §7), with a paste timeline
      // and a scrubbable replay. Y is true document position when every point has a
      // captured offset, else cumulative length. Content-free — built only from
      // counts, offsets, and timestamps, never text. SVG nodes use numeric attrs only.
      const SVG_NS = "http://www.w3.org/2000/svg";
      const isPaste = (p) => p.inserted > 0 && p.keystrokes === 0;

      function renderFingerprint(container, timeline) {
        if (!timeline || timeline.length === 0) return;

        const heading = document.createElement("h2");
        heading.textContent = "How the document was built over time";
        container.append(heading);

        // Position mode needs an offset on every point; otherwise fall back to length.
        const positionMode = timeline.every((p) => typeof p.offset === "number");
        const yVal = (p) => (positionMode ? p.offset : p.length);

        const W = 600, H = 180, pad = 28;
        const maxTime = Math.max(1, ...timeline.map((p) => p.at_ms));
        const maxY = Math.max(1, ...timeline.map(yVal));
        const x = (t) => pad + (t / maxTime) * (W - 2 * pad);
        const y = (v) => H - pad - (v / maxY) * (H - 2 * pad);

        const svg = document.createElementNS(SVG_NS, "svg");
        svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
        svg.setAttribute("role", "img");
        svg.setAttribute("aria-label", positionMode ? "Edit position over time" : "Document length over time");

        for (const [x1, y1, x2, y2] of [[pad, H - pad, W - pad, H - pad], [pad, pad, pad, H - pad]]) {
          const axis = document.createElementNS(SVG_NS, "line");
          axis.setAttribute("x1", x1); axis.setAttribute("y1", y1);
          axis.setAttribute("x2", x2); axis.setAttribute("y2", y2);
          axis.setAttribute("stroke", "#ccc"); axis.setAttribute("stroke-width", "1");
          svg.append(axis);
        }

        // progressive line (rebuilt as the playhead advances)
        const line = document.createElementNS(SVG_NS, "polyline");
        line.setAttribute("fill", "none");
        line.setAttribute("stroke", "#9aa0a6");
        line.setAttribute("stroke-width", "1.5");
        svg.append(line);

        // one dot per point; references kept so replay can reveal them in time order
        const dots = timeline.map((p) => {
          const dot = document.createElementNS(SVG_NS, "circle");
          dot.setAttribute("cx", x(p.at_ms));
          dot.setAttribute("cy", y(yVal(p)));
          dot.setAttribute("r", isPaste(p) ? 5 : 2.5);
          dot.setAttribute("fill", isPaste(p) ? "#e8a33d" : "#137333");
          svg.append(dot);
          return dot;
        });

        // playhead
        const playhead = document.createElementNS(SVG_NS, "line");
        playhead.setAttribute("y1", pad); playhead.setAttribute("y2", H - pad);
        playhead.setAttribute("stroke", "#1a73e8"); playhead.setAttribute("stroke-width", "1");
        svg.append(playhead);

        container.append(svg);

        // ---- replay state + rendering --------------------------------------
        let currentT = maxTime; // start fully revealed

        function paint(t) {
          currentT = t;
          const shown = timeline.filter((p) => p.at_ms <= t);
          line.setAttribute("points", shown.map((p) => `${x(p.at_ms)},${y(yVal(p))}`).join(" "));
          timeline.forEach((p, i) => dots[i].setAttribute("opacity", p.at_ms <= t ? "1" : "0.12"));
          playhead.setAttribute("x1", x(t));
          playhead.setAttribute("x2", x(t));
          scrubber.value = String(t);
        }

        // ---- controls: play/pause, scrubber, speed -------------------------
        const controls = document.createElement("div");
        controls.className = "controls";

        const playBtn = document.createElement("button");
        playBtn.textContent = "▶ Replay";

        const scrubber = document.createElement("input");
        scrubber.type = "range";
        scrubber.min = "0";
        scrubber.max = String(maxTime);
        scrubber.value = String(maxTime);

        const speed = document.createElement("select");
        for (const s of ["0.5", "1", "2", "4"]) {
          const opt = document.createElement("option");
          opt.value = s; opt.textContent = s + "×";
          if (s === "2") opt.selected = true;
          speed.append(opt);
        }

        controls.append(playBtn, scrubber, speed);
        container.append(controls);

        let playing = false;
        let lastFrame = 0;
        function step(ts) {
          if (!playing) return;
          if (!lastFrame) lastFrame = ts;
          const dt = (ts - lastFrame) * Number(speed.value);
          lastFrame = ts;
          let t = currentT + dt;
          if (t >= maxTime) { t = maxTime; stop(); }
          paint(t);
          if (playing) requestAnimationFrame(step);
        }
        function play() {
          if (currentT >= maxTime) currentT = 0; // restart if at the end
          playing = true; lastFrame = 0; playBtn.textContent = "❚❚ Pause";
          requestAnimationFrame(step);
        }
        function stop() { playing = false; playBtn.textContent = "▶ Replay"; }

        playBtn.addEventListener("click", () => (playing ? stop() : play()));
        scrubber.addEventListener("input", () => { stop(); paint(Number(scrubber.value)); });

        // ---- paste timeline with jump-to-paste markers ---------------------
        const pastePoints = timeline.filter(isPaste);
        if (pastePoints.length) {
          const pastes = document.createElement("div");
          pastes.className = "pastes";
          const label = document.createElement("span");
          label.textContent = "Jump to paste: ";
          pastes.append(label);
          for (const p of pastePoints) {
            const marker = document.createElement("button");
            marker.className = "marker";
            marker.textContent = `${(p.at_ms / 1000).toFixed(1)}s · ${p.inserted} chars`;
            marker.addEventListener("click", () => { stop(); paint(p.at_ms); });
            pastes.append(marker);
          }
          container.append(pastes);
        }

        const legend = document.createElement("div");
        legend.className = "legend";
        for (const [cls, lbl] of [["typed", "Typed"], ["pasted", "Pasted (a jump)"]]) {
          const item = document.createElement("span");
          item.className = cls;
          item.textContent = lbl;
          legend.append(item);
        }
        container.append(legend);

        const note = document.createElement("div");
        note.className = "note";
        note.textContent = positionMode
          ? "Edit position in the document over time — a paste is a jump, a revisit to earlier text dips back down. Built from offsets and timing only — no text."
          : "Length of the document as it was written. Vertical jumps are pastes; dips are deletions. Built from timing and counts only — no text.";
        container.append(note);

        paint(maxTime); // initial render: fully revealed
      }

      // Banded provenance report (signals spec §5): proportions of how text
      // entered, NOT a probability the text is AI. Built with textContent only.
      function renderReport(container, report) {
        if (!report) return;

        const heading = document.createElement("h2");
        heading.textContent = "How this document was written";
        container.append(heading);

        const summary = document.createElement("div");
        summary.className = "summary";
        summary.textContent = SUMMARY_LABELS[report.summary] || "Unknown";
        container.append(summary);

        for (const band of report.bands) {
          const pct = Math.round((band.fraction || 0) * 100);
          const row = document.createElement("div");
          row.className = "band";

          const label = document.createElement("span");
          label.textContent = BAND_LABELS[band.provenance] || band.provenance;

          const value = document.createElement("span");
          value.textContent = `${pct}%`;

          const track = document.createElement("span");
          const bar = document.createElement("span");
          bar.className = "bar " + (BAND_LABELS[band.provenance] ? band.provenance : "unknown");
          bar.style.width = pct + "%";
          track.append(bar);

          row.append(label, value, track);
          container.append(row);
        }

        const note = document.createElement("div");
        note.className = "note";
        note.textContent =
          "Proportions describe how text entered the document (typed vs. pasted vs. not captured) — not a guess about whether it is AI-written.";
        container.append(note);
      }

      button.addEventListener("click", async () => {
        const credential = await bytes(document.getElementById("credential"));
        const doc = await bytes(document.getElementById("document"));
        if (!credential || !doc) {
          alert("Pick both a credential and its document.");
          return;
        }
        render(verify_credential(credential, doc));
      });
    </script>
  </body>
</html>
