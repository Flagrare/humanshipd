<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>humanshipd — verify a credential</title>
    <style>
      body { font: 15px/1.6 -apple-system, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
      h1 { font-size: 20px; }
      p.note { color: #555; }
      label { display: block; margin: 14px 0 4px; font-weight: 600; }
      button { margin-top: 18px; padding: 9px 16px; font-size: 15px; cursor: pointer; }
      #result { margin-top: 22px; padding: 16px; border-radius: 8px; display: none; }
      #result.valid { background: #e6f4ea; border: 1px solid #137333; }
      #result.invalid { background: #fce8e6; border: 1px solid #b3261e; }
      .verdict { font-weight: 700; font-size: 16px; }
      .claim { margin-top: 8px; }
      dl { margin-top: 10px; font-size: 13px; color: #444; }
      dt { font-weight: 600; } dd { margin: 0 0 6px; word-break: break-all; }
      .report { margin-top: 18px; }
      .report h2 { font-size: 14px; margin: 0 0 4px; }
      .summary { font-weight: 600; margin-bottom: 10px; }
      .band { display: grid; grid-template-columns: 180px 48px 1fr; align-items: center; gap: 8px; margin: 5px 0; font-size: 13px; }
      .bar { height: 10px; border-radius: 5px; background: #ccc; }
      .bar.typed { background: #137333; }
      .bar.pasted { background: #e8a33d; }
      .bar.ai_tool { background: #b3261e; }
      .bar.unknown { background: #9aa0a6; }
      .report .note { font-size: 12px; color: #666; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Verify a Human Authored credential</h1>
    <p class="note">
      Everything runs in your browser — the document and credential never leave this
      page. Verification uses the exact same engine as the command-line tool.
    </p>

    <label for="credential">Credential (<code>.c2pa</code>)</label>
    <input id="credential" type="file" />

    <label for="document">The document it should belong to</label>
    <input id="document" type="file" />

    <button id="verify" disabled>Verify</button>

    <div id="result">
      <div class="verdict" id="verdict"></div>
      <div class="claim" id="claim"></div>
      <dl id="details"></dl>
      <div class="report" id="report"></div>
    </div>

    <script type="module">
      import init, { verify_credential } from "./pkg/humanshipd_web_verify.js";

      const button = document.getElementById("verify");
      const result = document.getElementById("result");

      await init();
      // Expose for automated tests; harmless for normal use.
      window.verify_credential = verify_credential;
      button.disabled = false;

      async function bytes(input) {
        const file = input.files[0];
        if (!file) return null;
        return new Uint8Array(await file.arrayBuffer());
      }

      // Fixed label/class maps — provenance & summary are enum strings from the
      // credential; we map only known values so nothing untrusted reaches the DOM.
      const BAND_LABELS = {
        typed: "Typed in a tracked editor",
        pasted: "Pasted",
        ai_tool: "From an AI tool",
        unknown: "Unknown (not captured)",
      };
      const SUMMARY_LABELS = {
        fully_typed: "Fully typed",
        typed_with_pastes: "Typed, with some pastes",
        mostly_pasted: "Mostly pasted",
        unverified: "Unverified — substantial content was not captured",
      };

      function render(out) {
        result.style.display = "block";
        result.className = out.valid ? "valid" : "invalid";
        document.getElementById("verdict").textContent = out.error
          ? `Could not read credential: ${out.error}`
          : out.valid
          ? "✓ Verified"
          : "✗ Not valid";
        document.getElementById("claim").textContent = out.claim || "";

        // Build details with textContent (never innerHTML): the values come from a
        // dropped credential, which could be hostile — treat them as untrusted data.
        const details = document.getElementById("details");
        const report = document.getElementById("report");
        details.replaceChildren();
        report.replaceChildren();
        if (out.error) return;
        const rows = [
          ["Document SHA-256", out.document_sha256],
          ["Characters", String(out.char_count)],
          ["Un-keyed (paste) insertions flagged", String(out.ai_dump_flags)],
        ];
        for (const [label, value] of rows) {
          const dt = document.createElement("dt");
          dt.textContent = label;
          const dd = document.createElement("dd");
          dd.textContent = value;
          details.append(dt, dd);
        }

        // Only show the provenance report when the credential is valid for THIS
        // document — otherwise the bands describe the credential's own session,
        // not the document on screen, which would mislead.
        if (out.valid) renderReport(report, out.report);
      }

      // Banded provenance report (signals spec §5): proportions of how text
      // entered, NOT a probability the text is AI. Built with textContent only.
      function renderReport(container, report) {
        if (!report) return;

        const heading = document.createElement("h2");
        heading.textContent = "How this document was written";
        container.append(heading);

        const summary = document.createElement("div");
        summary.className = "summary";
        summary.textContent = SUMMARY_LABELS[report.summary] || "Unknown";
        container.append(summary);

        for (const band of report.bands) {
          const pct = Math.round((band.fraction || 0) * 100);
          const row = document.createElement("div");
          row.className = "band";

          const label = document.createElement("span");
          label.textContent = BAND_LABELS[band.provenance] || band.provenance;

          const value = document.createElement("span");
          value.textContent = `${pct}%`;

          const track = document.createElement("span");
          const bar = document.createElement("span");
          bar.className = "bar " + (BAND_LABELS[band.provenance] ? band.provenance : "unknown");
          bar.style.width = pct + "%";
          track.append(bar);

          row.append(label, value, track);
          container.append(row);
        }

        const note = document.createElement("div");
        note.className = "note";
        note.textContent =
          "Proportions describe how text entered the document (typed vs. pasted vs. not captured) — not a guess about whether it is AI-written.";
        container.append(note);
      }

      button.addEventListener("click", async () => {
        const credential = await bytes(document.getElementById("credential"));
        const doc = await bytes(document.getElementById("document"));
        if (!credential || !doc) {
          alert("Pick both a credential and its document.");
          return;
        }
        render(verify_credential(credential, doc));
      });
    </script>
  </body>
</html>
